<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>仪表盘探路系统</title>

<style>

/* =========================
基础
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    position:fixed;
    inset:0;
}

/* =========================
场景
========================= */

#scene{
    position:relative;
    width:100%;
    height:100%;
    background:#111;
    transition:filter .2s ease;
}

/* =========================
仪表盘
========================= */

#dashboard{
    position:absolute;
    top:6vh;
    left:50%;
    transform:translateX(-50%);

    width:240px;
    height:240px;

    border-radius:50%;

    border:2px solid rgba(255,255,255,0.15);

    backdrop-filter: blur(8px);

    z-index:10;
}

/* 外圈刻度 */
#dial{
    width:100%;
    height:100%;
    border-radius:50%;

    background:
        radial-gradient(circle, transparent 55%, rgba(255,255,255,0.06) 56%),
        conic-gradient(
            from 180deg,
            rgba(255,80,80,0.2),
            rgba(255,255,255,0.05),
            rgba(80,255,120,0.2)
        );
}

/* 指针 */
#pointer{
    position:absolute;

    width:2px;
    height:110px;

    background:#ffd38a;

    left:50%;
    top:50%;

    transform-origin:bottom;
    transform:translate(-50%, -100%) rotate(0deg);

    box-shadow:0 0 12px rgba(255,200,120,0.7);
}

/* =========================
手灯
========================= */

#handLamp{
    position:absolute;

    bottom:8vh;
    left:50%;

    width:65vw;

    transform:translateX(-50%);

    will-change:transform;
}

/* =========================
提示（调试）
========================= */

#hint{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);

    color:#aaa;
    font-size:12px;
    opacity:0.6;
}

</style>
</head>

<body>

<div id="scene">

    <!-- 仪表盘 -->
    <div id="dashboard">
        <div id="dial"></div>
        <div id="pointer"></div>
    </div>

    <!-- 手灯 -->
    <img id="handLamp" src="./assets/1111.png">

    <div id="hint">仪表盘模式：移动手机或拖动鼠标</div>

</div>

<script>

// =========================
// DOM
// =========================

const pointer = document.getElementById("pointer");
const scene = document.getElementById("scene");
const hand = document.getElementById("handLamp");

// =========================
// 参数
// =========================

const MAX_ANGLE = 60;
const MAX_ROTATE = 90;

const MAX_MOVE = 60;
const EASE = 0.08;

// =========================
// 状态
// =========================

let targetRotate = 0;
let currentRotate = 0;

let targetX = 0;
let currentX = 0;

// =========================
// 核心逻辑
// =========================

function handleGamma(gamma){

    gamma = Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, gamma));

    // 指针旋转
    targetRotate = (gamma / MAX_ANGLE) * MAX_ROTATE;

    // 手灯移动
    targetX = (gamma / MAX_ANGLE) * MAX_MOVE;

    // 场景亮度（越偏越暗）
    let brightness = 1 - Math.abs(gamma / MAX_ANGLE) * 0.5;

    scene.style.filter = `brightness(${brightness})`;
}

// =========================
// 陀螺仪
// =========================

function onGyro(e){
    handleGamma(e.gamma || 0);
}

// =========================
// PC模拟
// =========================

window.addEventListener("mousemove", e => {

    const ratio = e.clientX / window.innerWidth;

    const gamma = (ratio - 0.5) * 2 * MAX_ANGLE;

    handleGamma(gamma);
});

// =========================
// 动画循环
// =========================

function animate(){

    // 指针
    currentRotate += (targetRotate - currentRotate) * 0.1;

    pointer.style.transform =
        `translate(-50%, -100%) rotate(${currentRotate}deg)`;

    // 手灯
    currentX += (targetX - currentX) * EASE;

    hand.style.transform =
        `translateX(calc(-50% + ${currentX}px))`;

    requestAnimationFrame(animate);
}

// =========================
// iOS权限
// =========================

function initGyro(){

    if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
    ){

        document.body.addEventListener("touchstart", async () => {

            try{

                const res =
                    await DeviceOrientationEvent.requestPermission();

                if(res === "granted"){

                    window.addEventListener("deviceorientation", onGyro, true);
                }

            }catch(e){
                console.log(e);
            }

        }, { once:true });

    }else{

        window.addEventListener("deviceorientation", onGyro, true);
    }
}

// =========================
// 启动
// =========================

initGyro();
animate();

</script>

</body>
</html>
